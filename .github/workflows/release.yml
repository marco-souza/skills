name: Release Workflow

on:
  push:
    tags:
      - '*.*.*'
      - '*.*.*-*'

permissions:
  contents: write

jobs:
  build:
    name: Build Release Assets
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
            ext: ""
          - os: linux
            arch: arm64
            ext: ""
          - os: linux
            arch: "386"
            ext: ""
          - os: darwin
            arch: amd64
            ext: ""
          - os: darwin
            arch: arm64
            ext: ""
          - os: windows
            arch: amd64
            ext: ".exe"
          - os: windows
            arch: "386"
            ext: ".exe"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Get version
        id: get_version
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build binary
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: 0
        run: |
          BINARY_NAME="skills-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.ext }}"
          echo "Building $BINARY_NAME for $GOOS/$GOARCH..."
          go build -ldflags="-s -w -X github.com/marco-souza/skills/cmd.version=${{ steps.get_version.outputs.version }} -X github.com/marco-souza/skills/cmd.commit=${{ github.sha }} -X github.com/marco-souza/skills/cmd.date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" -o "dist/$BINARY_NAME" .

      - name: Create tarball
        run: |
          BINARY_NAME="skills-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.ext }}"
          TAR_NAME="skills-${{ steps.get_version.outputs.version }}-${{ matrix.os }}-${{ matrix.arch }}.tar.gz"
          cd dist
          tar -czf "$TAR_NAME" "$BINARY_NAME"
          echo "Created $TAR_NAME"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.os }}-${{ matrix.arch }}
          path: dist/*
          retention-days: 1

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version
        id: get_version
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "version=$VERSION" >> $GITHUB_OUTPUT

          if [[ "$VERSION" == *-* ]]; then
            echo "prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "prerelease=false" >> $GITHUB_OUTPUT
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: build-*
          merge-multiple: true

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          cp artifacts/*.tar.gz release-assets/

          cd release-assets
          sha256sum *.tar.gz > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Generate release notes
        run: |
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")

          cat > release-notes.md << EOF
          ## Skills ${{ steps.get_version.outputs.version }}

          ### Installation

          #### macOS
          \`\`\`bash
          # Intel Macs
          curl -L -o skills.tar.gz "https://github.com/${{ github.repository }}/releases/download/${{ steps.get_version.outputs.version }}/skills-${{ steps.get_version.outputs.version }}-darwin-amd64.tar.gz"

          # Apple Silicon Macs
          curl -L -o skills.tar.gz "https://github.com/${{ github.repository }}/releases/download/${{ steps.get_version.outputs.version }}/skills-${{ steps.get_version.outputs.version }}-darwin-arm64.tar.gz"

          tar -xzf skills.tar.gz
          mv skills /usr/local/bin/
          \`\`\`

          #### Linux
          \`\`\`bash
          # AMD64
          curl -L -o skills.tar.gz "https://github.com/${{ github.repository }}/releases/download/${{ steps.get_version.outputs.version }}/skills-${{ steps.get_version.outputs.version }}-linux-amd64.tar.gz"

          # ARM64
          curl -L -o skills.tar.gz "https://github.com/${{ github.repository }}/releases/download/${{ steps.get_version.outputs.version }}/skills-${{ steps.get_version.outputs.version }}-linux-arm64.tar.gz"

          tar -xzf skills.tar.gz
          sudo mv skills /usr/local/bin/
          \`\`\`

          #### Windows
          \`\`\`powershell
          # AMD64
          curl.exe -L -o skills.tar.gz "https://github.com/${{ github.repository }}/releases/download/${{ steps.get_version.outputs.version }}/skills-${{ steps.get_version.outputs.version }}-windows-amd64.tar.gz"
          tar -xzf skills.tar.gz
          \`\`\`

          #### Go Install
          \`\`\`bash
          go install github.com/marco-souza/skills@${{ steps.get_version.outputs.version }}
          \`\`\`

          ### Verify Checksums

          \`\`\`bash
          sha256sum -c SHA256SUMS.txt
          \`\`\`

          ### Supported Platforms

          | OS | Architecture |
          |----|--------------|
          | Linux | amd64, arm64, 386 |
          | macOS | amd64, arm64 (Apple Silicon) |
          | Windows | amd64, 386 |

          ### Changelog
          EOF

          if [ -n "$PREVIOUS_TAG" ]; then
            echo "" >> release-notes.md
            echo "See [CHANGELOG.md](./CHANGELOG.md) for details." >> release-notes.md
            echo "" >> release-notes.md
            echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREVIOUS_TAG}...${{ steps.get_version.outputs.version }}" >> release-notes.md
          else
            echo "" >> release-notes.md
            echo "Initial release!" >> release-notes.md
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ steps.get_version.outputs.version }}
          body_path: release-notes.md
          draft: false
          prerelease: ${{ steps.get_version.outputs.prerelease }}
          files: |
            release-assets/*.tar.gz
            release-assets/SHA256SUMS.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish:
    name: Publish to Registries
    needs: release
    runs-on: ubuntu-latest
    if: ${{ !contains(github.ref, '-') }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Verify module
        run: |
          go mod verify
          go mod tidy

      - name: Notify release
        run: |
          echo "Release ${{ needs.release.outputs.version }} published!"
          echo "Install with: go install github.com/marco-souza/skills@${{ needs.release.outputs.version }}"
